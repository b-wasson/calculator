<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/mathlive"></script>
    <script defer src="script.js"></script>
</head>
<body>
    <button id="settings-btn">⚙</button>

    <div id="settings-overlay">
        <div id="settings-panel">
            <div id="settings-header">
                <p id="settings-title">Settings</p>
                <button id="settings-close">×</button>
            </div>
            <div class="setting-row">
                <span class="setting-label">Angle Mode</span>
                <div class="toggle-group">
                    <button class="toggle-btn active" data-value="rad">RAD</button>
                    <button class="toggle-btn" data-value="deg">DEG</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
<p id="var-title">Variables</p>
            <div id="var-list"></div>
            <button id="add-var">+ variable</button>
        </div>
        <div id="main">
            <div id="expressions"></div>
        </div>
    </div>
</body>
</html>
